services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: cwm
      POSTGRES_PASSWORD: cwm_password
      POSTGRES_DB: cwm_cleanarch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
